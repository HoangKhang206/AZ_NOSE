<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Bridge highlight: sáng trên, mờ dần xuống supratip -->
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="65%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Tip sphere: tâm sáng, fade ra ngoài -->
    <radialGradient id="tip" cx="50%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Alar shadow trái/phải: tối ở tâm, mờ ra ngoài -->
    <radialGradient id="shadowL" cx="60%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadowR" cx="40%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Nostril: vùng tối nhỏ, rõ nét hơn -->
    <radialGradient id="nostril" cx="50%" cy="45%" r="50%">
      <stop offset="20%"  stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Alar shadow trái: vùng rộng, mềm -->
  <ellipse cx="32" cy="75" rx="16" ry="12" fill="url(#shadowL)"/>

  <!-- Alar shadow phải -->
  <ellipse cx="68" cy="75" rx="16" ry="12" fill="url(#shadowR)"/>

  <!-- Lỗ mũi trái: tối, ellipse xoay -->
  <ellipse cx="39" cy="79" rx="7.5" ry="5.5"
           transform="rotate(-15 39 79)" fill="url(#nostril)"/>

  <!-- Lỗ mũi phải -->
  <ellipse cx="61" cy="79" rx="7.5" ry="5.5"
           transform="rotate(15 61 79)" fill="url(#nostril)"/>

  <!-- Bridge highlight: dải hẹp chạy dọc sống mũi -->
  <path d="M 47.5,22
           C 45.5,32 44,46 44.5,58 C 44.8,61.5 45.5,64.5 46,67
           L 54,67
           C 54.5,64.5 55.2,61.5 55.5,58 C 56,46 54.5,32 52.5,22 Z"
        fill="url(#bridge)"/>

  <!-- Tip highlight: hình cầu nhẹ ở chóp mũi -->
  <ellipse cx="50" cy="65.5" rx="9" ry="7" fill="url(#tip)"/>
</svg>
